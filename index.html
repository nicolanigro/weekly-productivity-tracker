<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Weekly Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <!-- TOP -->
    <div class="top-bar">
        <div class="week-bar">
            <div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
        </div>

        <button onclick="toggleDarkMode()" class="mode-btn">🌓</button>
    </div>

    <!-- INPUT -->
    <div class="input-box">
        <input id="taskInput" placeholder="Add task">

        <select id="type">
            <option value="priority">Priority</option>
            <option value="weekly">Weekly Goal</option>
            <option value="monthly">Monthly Goal</option>
        </select>

        <button onclick="addTask()">+</button>
    </div>

    <!-- CURRENT WEEK -->
    <h3>Current Week</h3>
    <div id="currentWeekLabel"></div>

    <ul id="priorityList"></ul>
    <ul id="weeklyList"></ul>
    <ul id="monthlyList"></ul>

    <!-- ARCHIVE -->
    <h3>Past Weeks</h3>
    <div id="archive"></div>

</div>

<script src="app.js"></script>
</body>
</html>
