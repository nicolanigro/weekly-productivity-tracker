<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <!-- TOP -->
    <div class="top-bar">
        <div class="week-bar">
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
            <div>Sun</div>
        </div>

        <button onclick="toggleDarkMode()" class="mode-btn">🌓</button>
    </div>

    <!-- INPUT -->
    <div class="input-box">
        <input id="taskInput" placeholder="Add item">
        <select id="type">
            <option value="priority">Priority</option>
            <option value="weekly">Weekly Goal</option>
            <option value="monthly">Monthly Goal</option>
        </select>

        <button onclick="addTask()">+</button>
    </div>

    <!-- PRIORITY -->
    <h3>Priority</h3>
    <ul id="priorityList"></ul>

    <!-- WEEKLY -->
    <h3>Weekly Goals</h3>
    <ul id="weeklyList"></ul>

    <!-- MONTHLY -->
    <h3>Monthly Goals</h3>
    <ul id="monthlyList"></ul>

</div>

<script src="app.js"></script>
</body>
</html>
