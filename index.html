<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Weekly Productivity Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- WEEK HEADER -->
    <div class="week-bar">
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
        <div>Sun</div>
    </div>

    <!-- INPUT -->
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Add task">
        <button onclick="addTask()">+</button>
    </div>

    <!-- TASK LIST -->
    <ul id="taskList"></ul>

    <!-- PROGRESS -->
    <div class="progress-container">
        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>
        <div id="progressText">0%</div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
