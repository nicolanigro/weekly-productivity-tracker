<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Weekly Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <!-- TOP WEEK BAR -->
    <div class="top-bar">

        <div class="week-bar">
            <div onclick="setDay(0)">Mon</div>
            <div onclick="setDay(1)">Tue</div>
            <div onclick="setDay(2)">Wed</div>
            <div onclick="setDay(3)">Thu</div>
            <div onclick="setDay(4)">Fri</div>
            <div onclick="setDay(5)">Sat</div>
            <div onclick="setDay(6)">Sun</div>
        </div>

        <button onclick="toggleDarkMode()" class="mode-btn">🌓</button>

    </div>

    <!-- INPUT -->
    <div class="input-box">

        <input id="taskInput" placeholder="Add task">

        <select id="type">
            <option value="priority">Priority</option>
            <option value="weekly">Weekly Goal</option>
            <option value="monthly">Monthly Goal</option>
        </select>

        <button onclick="addTask()">+</button>

    </div>

    <!-- TASKS -->
    <h3>Tasks</h3>

    <ul id="priorityList"></ul>
    <ul id="weeklyList"></ul>
    <ul id="monthlyList"></ul>

    <!-- PROGRESS BAR (ONLY ONCE) -->
    <div class="progress-container">

        <div class="progress-text" id="progressText">0% completed</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

    </div>

    <!-- ARCHIVE -->
    <h3>Past Weeks</h3>
    <div id="archive"></div>

</div>

<script src="app.js"></script>
</body>
</html>
